# restocontrol.uz — Nginx namunasi (Hikvision HTTP monitoring → Node API).
# Qo‘llash: nginx.conf ichidagi http { ... } ga map qo‘shing, keyin site faylini sites-enabled ga ulang.
# Tekshirish: nginx -t && systemctl reload nginx
#
# Talablar:
# - Node API faqat 127.0.0.1:8000 da tinglashi kerak (tashqaridan 8000 ochiq bo‘lmasin).
# - Server .env: TRUST_PROXY=1 (proxy orqasida to‘g‘ri IP / Express uchun).
# - Hikvision «HTTP monitoring»: https://restocontrol.uz/api/hikvision/event (443, HTTPS, POST).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name restocontrol.uz www.restocontrol.uz;

    # Certbot uchun (certbot --nginx bo‘lsa odatda o‘zi qo‘shadi):
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name restocontrol.uz www.restocontrol.uz;

    ssl_certificate     /etc/letsencrypt/live/restocontrol.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restocontrol.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/restocontrol_access.log;
    error_log  /var/log/nginx/restocontrol_error.log;

    client_max_body_size 50M;

    location /static/ {
        alias /var/www/restocontrol/static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/restocontrol/media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
